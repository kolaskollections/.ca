<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cart — KÓLA</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
:root {
    --bg: #080808;
    --panel: #121212;
    --text: #f8f6f2;
    --accent: #caa85c;
    --accent-soft: #e6cf97;
    --muted: #9a9a9a;
    --line: rgba(202, 168, 92, 0.18);
}

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    background: linear-gradient(to bottom, #080808, #101010);
    color: var(--text);
    font-family: "Times New Roman", serif;
}

a {
    text-decoration: none;
    color: inherit;
}

.nav {
    position: fixed;
    top: 0;
    width: 100%;
    padding: 28px 60px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    z-index: 1000;
    background: rgba(8, 8, 8, 0.86);
    backdrop-filter: blur(10px);
    border-bottom: 1px solid rgba(202, 168, 92, 0.08);
}

.logo {
    font-size: 16px;
    letter-spacing: 5px;
    color: var(--accent);
    cursor: pointer;
}

.nav-right {
    display: flex;
    gap: 28px;
    align-items: center;
}

.nav-right a,
.nav-right i {
    font-size: 12px;
    letter-spacing: 2px;
    color: var(--muted);
    text-transform: uppercase;
    transition: 0.3s;
    cursor: pointer;
}

.nav-right a:hover,
.nav-right i:hover {
    color: var(--accent);
}

.page-header {
    min-height: 48vh;
    padding: 140px 60px 60px;
    display: flex;
    align-items: end;
    background:
        linear-gradient(rgba(8,8,8,0.45), rgba(8,8,8,0.75)),
        radial-gradient(circle at 30% 40%, rgba(202,168,92,0.10), transparent 40%),
        linear-gradient(135deg, #111, #090909);
}

.page-header h1 {
    font-size: 68px;
    font-weight: 400;
    letter-spacing: 5px;
    text-transform: uppercase;
}

.content {
    padding: 90px 60px 110px;
    max-width: 1100px;
    margin: 0 auto;
}

.cart-box {
    background: var(--panel);
    border: 1px solid rgba(202, 168, 92, 0.12);
    padding: 40px;
    text-align: center;
}

.cart-box h2 {
    font-size: 24px;
    font-weight: 400;
    margin-bottom: 16px;
}

.cart-box p {
    color: #d8d1c7;
    line-height: 1.8;
    max-width: 560px;
    margin: 0 auto 28px;
}

.cart-actions {
    display: flex;
    justify-content: center;
    gap: 16px;
    flex-wrap: wrap;
}

.cart-actions a {
    padding: 14px 24px;
    font-size: 12px;
    letter-spacing: 3px;
    text-transform: uppercase;
    transition: 0.3s;
}

.btn-main {
    background: var(--accent);
    color: #111;
}

.btn-main:hover {
    background: var(--accent-soft);
}

.btn-outline {
    border: 1px solid rgba(255,255,255,0.22);
    color: var(--text);
    background: rgba(255,255,255,0.03);
}

.btn-outline:hover {
    border-color: var(--accent);
    color: var(--accent);
}

.footer {
    padding: 70px 60px;
    text-align: center;
    font-size: 11px;
    letter-spacing: 2px;
    color: var(--muted);
    border-top: 1px solid rgba(202, 168, 92, 0.15);
}

@media (max-width: 640px) {
    .nav {
        padding: 22px 24px;
    }

    .page-header {
        padding: 120px 24px 50px;
    }

    .content {
        padding: 70px 24px 90px;
    }

    .page-header h1 {
        font-size: 42px;
    }
}
</style>
</head>
<body>

<nav class="nav">
    <div class="logo" onclick="goHome()">KÓLA</div>
    <div class="nav-right">
        <a onclick="goShop()">Shop</a>
        <a onclick="goAbout()">About</a>
        <i class="fa-solid fa-cart-shopping" onclick="goCart()" title="Cart"></i>
    </div>
</nav>

<section class="page-header">
    <h1>Cart</h1>
</section>

<div class="content">
    <div class="cart-box">
        <h2>Your cart is currently empty.</h2>
        <p>
            Once you’re ready, your selected pieces can live here before checkout.
            For now, return to the shop and keep browsing the collection.
        </p>

        <div class="cart-actions">
            <a href="shop.html" class="btn-main">Back to Shop</a>
            <a href="about.html" class="btn-outline">About KÓLA</a>
        </div>
    </div>
</div>

<footer class="footer">
    © 2026 Kóla Klöset — Rare pieces. No restocks. Built for presence.
</footer>

<script>
function goHome() {
    window.location.href = 'index.html';
}

function goShop() {
    window.location.href = 'shop.html';
}

function goAbout() {
    window.location.href = 'about.html';
}

function goCart() {
    window.location.href = 'cart.html';
}
</script>

</body>
</html>
