<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cart — kólas.kloset</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
:root {
    --bg: #080808;
    --panel: #121212;
    --text: #f8f4ed;
    --accent: #d87a1d;
    --accent-soft: #f0d4b0;
    --muted: #9b948b;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
    background: linear-gradient(to bottom, #080808, #101010);
    color: var(--text);
    font-family: "Times New Roman", serif;
}

/* NAV */
.nav {
    position: fixed;
    top: 0;
    width: 100%;
    padding: 20px 0;
    background: rgba(8,8,8,0.9);
}

.nav-inner {
    width: min(1100px, 90%);
    margin:auto;
    display:flex;
    justify-content:space-between;
}

.nav-right a {
    margin-left:20px;
    cursor:pointer;
}

/* HEADER */
.page-header {
    padding:140px 0 60px;
    text-align:center;
}

.page-header h1 {
    font-size:60px;
}

/* CONTENT */
.content {
    width: min(900px, 90%);
    margin:auto;
}

.cart-item {
    display:flex;
    justify-content:space-between;
    padding:15px 0;
    border-bottom:1px solid #333;
}

.summary {
    margin-top:30px;
}

.checkout-btn {
    width:100%;
    padding:15px;
    margin-top:20px;
    background: var(--accent);
    border:none;
    cursor:pointer;
}

.back-btn {
    display:block;
    text-align:center;
    margin-top:10px;
}

/* FOOTER */
.footer {
    text-align:center;
    margin-top:60px;
    padding-bottom:40px;
}
</style>
</head>

<body>

<nav class="nav">
    <div class="nav-inner">
        <div onclick="goHome()">Logo</div>
        <div class="nav-right">
            <a onclick="goShop()">Shop</a>
            <a onclick="goAbout()">About</a>
        </div>
    </div>
</nav>

<section class="page-header">
    <h1>Your Cart</h1>
</section>

<div class="content">
    <div id="cartItems"></div>

    <div class="summary">
        <div>
            Subtotal: <span id="subtotal">$0.00</span>
        </div>

        <!-- ✅ NEW CHECKOUT BUTTON -->
        <button class="checkout-btn" onclick="checkout()">
            Proceed to Payment
        </button>

        <a href="shop.html" class="back-btn">Back to Shop</a>
    </div>
</div>

<footer class="footer">
    © 2026 kólas.kloset
</footer>

<script>
const BACKEND_URL = "https://stripe-backend-m9du.onrender.com/create-checkout-session";

function goHome() {
    window.location.href = 'index.html';
}

function goShop() {
    window.location.href = 'shop.html';
}

function goAbout() {
    window.location.href = 'about.html';
}

/* LOAD CART */
function loadCart() {
    const cart = JSON.parse(localStorage.getItem('kolaCart')) || [];
    const cartItemsEl = document.getElementById('cartItems');
    const subtotalEl = document.getElementById('subtotal');

    if (cart.length === 0) {
        cartItemsEl.innerHTML = "<p>Your cart is empty</p>";
        return;
    }

    let subtotal = 0;

    cartItemsEl.innerHTML = cart.map(item => {
        subtotal += item.price * item.quantity;

        return `
            <div class="cart-item">
                <span>${item.name}</span>
                <span>${item.quantity} × $${item.price}</span>
            </div>
        `;
    }).join("");

    subtotalEl.textContent = "$" + subtotal.toFixed(2);
}

/* CHECKOUT FUNCTION */
async function checkout() {
    const cart = JSON.parse(localStorage.getItem('kolaCart')) || [];

    if (cart.length === 0) {
        alert("Your cart is empty");
        return;
    }

    try {
        const res = await fetch(BACKEND_URL, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ items: cart })
        });

        const data = await res.json();

        if (data.url) {
            window.location.href = data.url;
        } else {
            alert("Checkout failed");
        }

    } catch (err) {
        alert("Error connecting to payment");
        console.error(err);
    }
}

loadCart();
</script>

</body>
</html>
