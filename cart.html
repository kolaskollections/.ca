<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cart — kólas.kloset</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
:root {
    --bg: #080808;
    --panel: #121212;
    --text: #f8f4ed;
    --accent: #d87a1d;
    --accent-soft: #f0d4b0;
    --muted: #9b948b;
    --line: rgba(216, 122, 29, 0.18);
}

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    background: linear-gradient(to bottom, #080808, #101010);
    color: var(--text);
    font-family: "Times New Roman", serif;
    overflow-x: hidden;
}

a {
    text-decoration: none;
    color: inherit;
}

button {
    font-family: inherit;
}

/* NAV */
.nav {
    position: fixed;
    top: 0;
    width: 100%;
    padding: 16px 0;
    z-index: 1000;
    background: rgba(8, 8, 8, 0.9);
    backdrop-filter: blur(10px);
    border-bottom: 1px solid rgba(216, 122, 29, 0.08);
}

.nav-inner {
    width: min(1100px, calc(100% - 24px));
    margin: auto;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 16px;
}

.logo-image {
    height: clamp(38px, 5vw, 54px);
    width: auto;
    display: block;
}

.logo-button {
    background: none;
    border: none;
    cursor: pointer;
    padding: 0;
}

.nav-right {
    display: flex;
    align-items: center;
    gap: 16px;
    flex-wrap: wrap;
    justify-content: flex-end;
}

.nav-right a {
    font-size: 11px;
    letter-spacing: 2px;
    color: var(--muted);
    text-transform: uppercase;
    cursor: pointer;
    white-space: nowrap;
}

.nav-right a:hover {
    color: var(--accent);
}

/* HEADER */
.page-header {
    padding: 130px 0 40px;
}

.page-header-inner {
    width: min(1100px, calc(100% - 24px));
    margin: auto;
}

.page-header h1 {
    font-size: clamp(40px, 7vw, 64px);
    letter-spacing: 4px;
    text-transform: uppercase;
    font-weight: 400;
}

/* CONTENT */
.content {
    width: min(900px, calc(100% - 24px));
    margin: auto;
    padding: 30px 0 80px;
}

.cart-box {
    background: var(--panel);
    border: 1px solid rgba(216, 122, 29, 0.12);
    padding: 22px;
}

.cart-item {
    display: grid;
    grid-template-columns: 1.4fr 0.7fr 0.7fr auto;
    gap: 12px;
    align-items: center;
    padding: 18px 0;
    border-bottom: 1px solid rgba(216, 122, 29, 0.08);
}

.cart-item:last-child {
    border-bottom: none;
}

.item-name {
    font-size: 22px;
}

.item-meta,
.item-total {
    font-size: 16px;
    color: var(--accent-soft);
}

.remove-btn {
    background: none;
    border: 1px solid rgba(216, 122, 29, 0.28);
    color: var(--text);
    padding: 12px 14px;
    min-height: 44px;
    min-width: 88px;
    cursor: pointer;
    transition: 0.3s;
    font-size: 12px;
    letter-spacing: 1px;
}

.remove-btn:hover {
    background: var(--accent);
    color: #111;
    border-color: var(--accent);
}

.summary {
    margin-top: 26px;
    padding-top: 20px;
    border-top: 1px solid rgba(216, 122, 29, 0.12);
}

.summary-line {
    display: flex;
    justify-content: space-between;
    margin-bottom: 18px;
    font-size: 20px;
}

.checkout-btn,
.back-btn {
    display: block;
    width: 100%;
    text-align: center;
    padding: 14px 18px;
    margin-top: 14px;
    text-transform: uppercase;
    letter-spacing: 3px;
    font-size: 12px;
    transition: 0.3s;
}

.checkout-btn {
    background: var(--accent);
    color: #111;
    border: none;
    cursor: pointer;
}

.checkout-btn:hover {
    background: var(--accent-soft);
}

.back-btn {
    border: 1px solid rgba(255,255,255,0.22);
    color: var(--text);
    background: rgba(255,255,255,0.03);
}

.back-btn:hover {
    border-color: var(--accent);
    color: var(--accent);
}

.empty-cart {
    font-size: 20px;
    color: var(--muted);
    text-align: center;
    padding: 20px 0;
}

.footer {
    width: min(1100px, calc(100% - 24px));
    margin: auto;
    padding: 0 0 50px;
    text-align: center;
    font-size: 11px;
    letter-spacing: 2px;
    color: var(--muted);
    border-top: 1px solid rgba(202, 168, 92, 0.15);
    padding-top: 30px;
}

/* MOBILE */
@media (max-width: 700px) {
    .cart-box {
        padding: 18px;
    }

    .cart-item {
        grid-template-columns: 1fr;
        gap: 8px;
        padding: 16px 0;
    }

    .item-name {
        font-size: 20px;
    }

    .item-meta,
    .item-total {
        font-size: 15px;
    }

    .remove-btn {
        width: 100%;
    }

    .summary-line {
        font-size: 18px;
    }
}
</style>
</head>
<body>

<nav class="nav">
    <div class="nav-inner">
        <button class="logo-button" onclick="goHome()" aria-label="Go to home page">
            <img src="./brand-logo.png" alt="kólas.kloset" class="logo-image">
        </button>

        <div class="nav-right">
            <a onclick="goShop()">Shop</a>
            <a onclick="goAbout()">About</a>
        </div>
    </div>
</nav>

<section class="page-header">
    <div class="page-header-inner">
        <h1>Your Cart</h1>
    </div>
</section>

<div class="content">
    <div class="cart-box">
        <div id="cartItems"></div>

        <div class="summary">
            <div class="summary-line">
                <span>Subtotal</span>
                <span id="subtotal">$0.00</span>
            </div>

            <button class="checkout-btn" onclick="checkout()">Proceed to Payment</button>
            <a href="shop.html" class="back-btn">Back to Shop</a>
        </div>
    </div>
</div>

<footer class="footer">
    © 2026 kólas.kloset
</footer>

<script>
const BACKEND_URL = "https://stripe-backend-m9du.onrender.com/create-checkout-session";

function goHome() {
    window.location.href = 'index.html';
}

function goShop() {
    window.location.href = 'shop.html';
}

function goAbout() {
    window.location.href = 'about.html';
}

function getCart() {
    return JSON.parse(localStorage.getItem('kolaCart')) || [];
}

function saveCart(cart) {
    localStorage.setItem('kolaCart', JSON.stringify(cart));
}

function loadCart() {
    const cart = getCart();
    const cartItemsEl = document.getElementById('cartItems');
    const subtotalEl = document.getElementById('subtotal');

    if (cart.length === 0) {
        cartItemsEl.innerHTML = '<div class="empty-cart">Your cart is empty</div>';
        subtotalEl.textContent = '$0.00';
        return;
    }

    let subtotal = 0;

    cartItemsEl.innerHTML = cart.map((item, index) => {
        const qty = Number(item.quantity) || 1;
        const price = Number(item.price) || 0;
        const lineTotal = price * qty;
        subtotal += lineTotal;

        return `
            <div class="cart-item">
                <div class="item-name">${item.name}</div>
                <div class="item-meta">Qty: ${qty}</div>
                <div class="item-total">$${lineTotal.toFixed(2)}</div>
                <button class="remove-btn" onclick="removeItem(${index})">Remove</button>
            </div>
        `;
    }).join("");

    subtotalEl.textContent = "$" + subtotal.toFixed(2);
}

function removeItem(index) {
    const cart = getCart();
    cart.splice(index, 1);
    saveCart(cart);
    loadCart();
}

async function checkout() {
    const cart = getCart();

    if (cart.length === 0) {
        alert("Your cart is empty");
        return;
    }

    try {
        const res = await fetch(BACKEND_URL, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ items: cart })
        });

        const data = await res.json();

        if (data.url) {
            window.location.href = data.url;
        } else {
            alert("Checkout failed");
        }
    } catch (err) {
        alert("Error connecting to payment");
        console.error(err);
    }
}

loadCart();
</script>

</body>
</html>
