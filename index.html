<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href='https://cdn.jsdelivr.net/npm/boxicons@2.0.5/css/boxicons.min.css' rel='stylesheet'>

<title>KolasKollections</title>

<style>

/* ===== GLOBAL ===== */
body {
    margin: 0;
    font-family: 'Helvetica Neue', sans-serif;
    background: #0a0a0a;
    color: #f5f5f5;
}

a {
    color: inherit;
    text-decoration: none;
}

.section {
    padding: 100px 10%;
}

img {
    display: block;
    max-width: 100%;
}

/* ===== NAV ===== */
.nav {
    display: flex;
    justify-content: space-between;
    padding: 20px 10%;
    position: fixed;
    width: 100%;
    top: 0;
    background: rgba(10,10,10,0.7);
    backdrop-filter: blur(12px);
    z-index: 100;
}

.logo {
    font-weight: 600;
    letter-spacing: 3px;
}

.nav a {
    margin-left: 25px;
    opacity: 0.6;
    transition: 0.3s;
}

.nav a:hover {
    opacity: 1;
}

/* ===== HERO ===== */
.hero {
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 10%;
}

.hero h1 {
    font-size: 64px;
    line-height: 1.05;
}

.hero span {
    color: #c6a87d;
}

.hero p {
    opacity: 0.6;
    margin-top: 20px;
}

.hero img {
    width: 420px;
}

/* ===== GRID ===== */
.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
    gap: 25px;
}

.card {
    position: relative;
    overflow: hidden;
    cursor: pointer;
}

.card img {
    transition: 0.5s ease;
}

.card:hover img {
    transform: scale(1.08);
}

.card .info {
    position: absolute;
    bottom: 0;
    padding: 20px;
    background: linear-gradient(transparent, rgba(0,0,0,0.9));
    width: 100%;
    font-size: 14px;
    letter-spacing: 1px;
}

/* ===== TITLES ===== */
.title {
    font-size: 30px;
    margin-bottom: 30px;
    letter-spacing: 2px;
}

/* ===== FOOTER ===== */
.footer {
    text-align: center;
    padding: 60px;
    opacity: 0.5;
    font-size: 14px;
}

</style>
</head>

<body>

<!-- NAV -->
<div class="nav">
    <div class="logo">KOLA KLOSET</div>
    <div>
        <a href="#">Drops</a>
        <a href="#">Archive</a>
        <a href="#">Contact</a>
    </div>
</div>

<!-- HERO -->
<section class="hero">
    <div>
        <h1>
            CURATED <br>
            <span>THRIFT</span> <br>
            CULTURE
        </h1>
        <p>
            Rare pieces. No restocks. Built for presence.
        </p>
    </div>

    <img src="./1.png">
</section>

<!-- DROPS -->
<section class="section">
    <div class="title">LATEST DROP</div>

    <div class="grid">

        <div class="card">
            <img src="./2.png">
            <div class="info">
                Vintage Leather — $85
            </div>
        </div>

        <div class="card">
            <img src="./3.png">
            <div class="info">
                Oversized Tee — $25
            </div>
        </div>

        <div class="card">
            <img src="./4.png">
            <div class="info">
                Distressed Denim — $60
            </div>
        </div>

    </div>
</section>

<!-- LOOKBOOK -->
<section class="section">
    <div class="title">LOOKBOOK</div>

    <div class="grid">
        <div class="card"><img src="./5.png"></div>
        <div class="card"><img src="./6.png"></div>
        <div class="card"><img src="./7.png"></div>
        <div class="card"><img src="./8.png"></div>
    </div>
</section>

<!-- FOOTER -->
<div class="footer">
    © KolasKollections — KolaKloset
</div>

</body>
</html>

</body>
</html>
