<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href='https://cdn.jsdelivr.net/npm/boxicons@2.0.5/css/boxicons.min.css' rel='stylesheet'>

<title>KolasKollections</title>

<style>
/* ===== GLOBAL ===== */
body {
    margin: 0;
    font-family: 'Helvetica Neue', sans-serif;
    background: #0a0a0a;
    color: #f5f5f5;
}

a {
    color: inherit;
    text-decoration: none;
}

.section {
    padding: 80px 10%;
}

/* ===== NAV ===== */
.nav {
    display: flex;
    justify-content: space-between;
    padding: 20px 10%;
    position: fixed;
    width: 100%;
    top: 0;
    background: rgba(10,10,10,0.8);
    backdrop-filter: blur(10px);
}

.logo {
    font-weight: bold;
    letter-spacing: 2px;
}

.nav a {
    margin-left: 20px;
    opacity: 0.7;
}

.nav a:hover {
    opacity: 1;
}

/* ===== HERO ===== */
.hero {
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 10%;
}

.hero h1 {
    font-size: 60px;
    line-height: 1.1;
}

.hero span {
    color: #c6a87d;
}

.hero img {
    width: 400px;
}

/* ===== GRID ===== */
.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 20px;
}

.card {
    position: relative;
    overflow: hidden;
}

.card img {
    width: 100%;
    transition: 0.4s;
}

.card:hover img {
    transform: scale(1.1);
}

.card .info {
    position: absolute;
    bottom: 0;
    padding: 20px;
    background: linear-gradient(transparent, black);
    width: 100%;
}

/* ===== TEXT ===== */
.title {
    font-size: 28px;
    margin-bottom: 20px;
}

/* ===== FOOTER ===== */
.footer {
    text-align: center;
    padding: 40px;
    opacity: 0.6;
}
</style>
</head>

<body>

<!-- NAV -->
<div class="nav">
    <div class="logo">KOLA KLOWT</div>
    <div>
        <a href="#">Drops</a>
        <a href="#">Archive</a>
        <a href="#">Contact</a>
    </div>
</div>

<!-- HERO -->
<section class="hero">
    <div>
        <h1>
            CURATED <br>
            <span>THRIFT</span> <br>
            CULTURE
        </h1>
        <p style="opacity:0.6; margin-top:20px;">
            Rare pieces. No restocks. Built for presence.
        </p>
    </div>

    <img src="img/1.png">
</section>

<!-- DROPS -->
<section class="section">
    <div class="title">LATEST DROP</div>

    <div class="grid">

        <div class="card">
            <img src="img/2.png">
            <div class="info">
                Vintage Leather — $85
            </div>
        </div>

        <div class="card">
            <img src="img/3.png">
            <div class="info">
                Oversized Tee — $25
            </div>
        </div>

        <div class="card">
            <img src="img/4.png">
            <div class="info">
                Distressed Denim — $60
            </div>
        </div>

    </div>
</section>

<!-- LOOKBOOK -->
<section class="section">
    <div class="title">LOOKBOOK</div>

    <div class="grid">
        <div class="card"><img src="img/5.png"></div>
        <div class="card"><img src="img/6.png"></div>
        <div class="card"><img src="img/7.png"></div>
        <div class="card"><img src="img/8.png"></div>
    </div>
</section>

<!-- FOOTER -->
<div class="footer">
    © Kolas Kollections — Kola Kloset
</div>

</body>
</html>
