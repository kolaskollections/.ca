<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>KolasKloset</title>

<style>

/* ===== COLORS ===== */
:root {
    --bg: #050505;
    --text: #f5f5f5;
    --accent: #c47a2c;
    --muted: #777;
}

/* ===== BASE ===== */
body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: "Times New Roman", serif;
}

a {
    text-decoration: none;
    color: inherit;
}

/* ===== NAV ===== */
.nav {
    position: fixed;
    top: 0;
    width: 100%;
    padding: 30px 60px;
    display: flex;
    justify-content: space-between;
    z-index: 100;
}

.logo {
    font-size: 14px;
    letter-spacing: 4px;
}

.nav-right a {
    margin-left: 30px;
    font-size: 13px;
    letter-spacing: 2px;
    color: var(--muted);
}

.nav-right a:hover {
    color: var(--text);
}

/* ===== HERO ===== */
.hero {
    height: 100vh;
    position: relative;
}

.hero img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

/* ===== OVERLAY ===== */
.overlay {
    position: absolute;
    bottom: 80px;
    left: 60px;
}

.overlay h1 {
    font-size: 64px;
    margin: 0;
    font-weight: 400;
    letter-spacing: 3px;
}

.overlay span {
    color: var(--accent);
}

/* ===== SECTION ===== */
.section {
    padding: 160px 60px;
}

.section h2 {
    font-size: 12px;
    letter-spacing: 6px;
    color: var(--muted);
    margin-bottom: 60px;
}

/* ===== GRID ===== */
.grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 20px;
}

.card {
    position: relative;
    overflow: hidden;
}

.card img {
    width: 100%;
    transition: 0.6s;
}

.card:hover img {
    transform: scale(1.05);
}

/* subtle luxury hover */
.card::after {
    content: "VIEW";
    position: absolute;
    bottom: 20px;
    left: 20px;
    font-size: 12px;
    letter-spacing: 3px;
    opacity: 0;
    transition: 0.4s;
}

.card:hover::after {
    opacity: 1;
}

/* ===== FOOTER ===== */
.footer {
    text-align: center;
    padding: 100px;
    font-size: 11px;
    color: var(--muted);
}

</style>
</head>

<body>

<!-- NAV -->
<div class="nav">
    <div class="logo">KÓLA</div>

    <div class="nav-right">
        <a href="#shop">SHOP</a>
        <a href="#">CART</a>
    </div>
</div>

<!-- HERO -->
<section class="hero">
    <img src="./1.png">

    <div class="overlay">
        <h1>SHOP <span>KOLLECTIONS</span></h1>
    </div>
</section>

<!-- NEW ARRIVAL -->
<section class="section" id="shop">
    <h2>NEW ARRIVAL</h2>

    <div class="grid">
        <div class="card"><img src="./2.png"></div>
        <div class="card"><img src="./3.png"></div>
        <div class="card"><img src="./4.png"></div>
    </div>
</section>

<!-- MONTHLY PICK -->
<section class="section">
    <h2>KÓLA MONTHLY PICK</h2>

    <div class="grid">
        <div class="card"><img src="./5.png"></div>
        <div class="card"><img src="./6.png"></div>
        <div class="card"><img src="./7.png"></div>
    </div>
</section>

<!-- FOOTER -->
<div class="footer">
    © Kóla — KolasKloset
</div>

</body>
</html>
