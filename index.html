<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href='https://cdn.jsdelivr.net/npm/boxicons@2.0.5/css/boxicons.min.css' rel='stylesheet'>

<title>KolasKollections</title>

<style>

/* ===== GLOBAL ===== */
body {
    margin: 0;
    font-family: 'Helvetica Neue', sans-serif;
    background: #0a0a0a;
    color: #f5f5f5;
}

a {
    text-decoration: none;
    color: inherit;
}

.section {
    padding: 140px 12%;
}

img {
    max-width: 100%;
    display: block;
}

/* ===== NAV ===== */
.nav {
    display: flex;
    justify-content: space-between;
    padding: 25px 12%;
    position: fixed;
    width: 100%;
    top: 0;
    background: rgba(10,10,10,0.6);
    backdrop-filter: blur(12px);
    z-index: 100;
}

.logo {
    font-weight: 600;
    letter-spacing: 4px;
    font-size: 14px;
}

.nav a {
    margin-left: 30px;
    font-size: 14px;
    opacity: 0.6;
}

.nav a:hover {
    opacity: 1;
}

/* ===== HERO ===== */
.hero {
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 0 12%;
}

.hero h1 {
    font-size: 72px;
    line-height: 1;
    margin: 0;
}

.hero span {
    color: #c6a87d;
}

.hero p {
    margin-top: 25px;
    opacity: 0.6;
    max-width: 400px;
}

/* ===== BUTTON ===== */
.button {
    margin-top: 40px;
    display: inline-block;
    border: 1px solid #fff;
    padding: 12px 30px;
    font-size: 12px;
    letter-spacing: 2px;
    transition: 0.3s;
}

.button:hover {
    background: #fff;
    color: #000;
}

/* ===== FEATURE IMAGE ===== */
.feature {
    margin-top: 120px;
}

.feature img {
    width: 100%;
    height: 80vh;
    object-fit: cover;
}

/* ===== SECTION TITLE ===== */
.title {
    font-size: 22px;
    letter-spacing: 5px;
    margin-bottom: 60px;
    opacity: 0.8;
}

/* ===== GRID ===== */
.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
    gap: 40px;
}

.card {
    position: relative;
    overflow: hidden;
}

.card img {
    transition: 0.6s;
}

.card:hover img {
    transform: scale(1.1);
}

.card .info {
    position: absolute;
    bottom: 0;
    padding: 25px;
    background: linear-gradient(transparent, rgba(0,0,0,0.9));
    width: 100%;
    font-size: 13px;
    letter-spacing: 1px;
}

/* ===== FOOTER ===== */
.footer {
    text-align: center;
    padding: 80px;
    opacity: 0.4;
    font-size: 12px;
}

</style>
</head>

<body>

<!-- NAV -->
<div class="nav">
    <div class="logo">KOLA KLOSET</div>
    <div>
        <a href="#shop">Shop</a>
        <a href="#">Archive</a>
        <a href="#">Contact</a>
    </div>
</div>

<!-- HERO -->
<section class="hero">
    <h1>
        CURATED <br>
        <span>THRIFT</span> <br>
        CULTURE
    </h1>

    <p>
        Rare pieces. No restocks. Built for presence.
    </p>

    <a href="#shop" class="button">ENTER</a>

    <div class="feature">
        <img src="./1.png">
    </div>
</section>

<!-- SHOP KOLLECTIONS -->
<section class="section" id="shop">
    <div class="title">SHOP KOLLECTIONS</div>

    <div class="grid">

        <div class="card">
            <img src="./2.png">
            <div class="info">Vintage Leather — $85</div>
        </div>

        <div class="card">
            <img src="./3.png">
            <div class="info">Oversized Tee — $25</div>
        </div>

        <div class="card">
            <img src="./4.png">
            <div class="info">Distressed Denim — $60</div>
        </div>

    </div>
</section>

<!-- LOOKBOOK -->
<section class="section">
    <div class="title">ARCHIVE</div>

    <div class="grid">
        <div class="card"><img src="./5.png"></div>
        <div class="card"><img src="./6.png"></div>
        <div class="card"><img src="./7.png"></div>
        <div class="card"><img src="./8.png"></div>
    </div>
</section>

<!-- FOOTER -->
<div class="footer">
    © KolasKollections — KolaKloset
</div>

</body>
</html>

</body>
</html>
