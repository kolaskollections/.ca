<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KÓLA — Home</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
:root {
    --bg: #080808;
    --text: #f8f6f2;
    --accent: #caa85c;
    --muted: #9a9a9a;
}

* {
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body {
    background:#080808;
    color:var(--text);
    font-family:"Times New Roman", serif;
}

/* NAV */
.nav {
    position:fixed;
    top:0;
    width:100%;
    padding:25px 60px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    background:rgba(8,8,8,0.9);
}

/* ✅ NEW LOGO STYLING */
.logo-button {
    background:none;
    border:none;
    cursor:pointer;
    padding:0;
}

.logo-image {
    height:50px;
    width:auto;
    display:block;
}

.nav-right {
    display:flex;
    gap:25px;
}

.nav-right a, .nav-right i {
    font-size:12px;
    letter-spacing:2px;
    color:var(--muted);
    cursor:pointer;
}

.nav-right a:hover, .nav-right i:hover {
    color:var(--accent);
}

/* HERO */
.hero {
    padding:140px 60px;
}

.hero h1 {
    font-size:70px;
}

.hero p {
    margin:20px 0;
    max-width:500px;
}

.btn {
    padding:12px 20px;
    border:1px solid var(--accent);
    display:inline-block;
    margin-top:20px;
    cursor:pointer;
}

/* SECTIONS */
.section {
    padding:60px;
}

.grid {
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:20px;
}

.card {
    background:#121212;
    padding:15px;
}

.card-image {
    height:200px;
    background:#222;
    display:flex;
    align-items:center;
    justify-content:center;
}

.footer {
    text-align:center;
    padding:40px;
    color:var(--muted);
}
</style>
</head>

<body>

<nav class="nav">

    <!-- ✅ IMAGE LOGO -->
    <button class="logo-button" onclick="goHome()">
        <img src="./brand-logo.png" class="logo-image" alt="kólas.kloset">
    </button>

    <div class="nav-right">
        <a onclick="goShop()">Shop</a>
        <a onclick="goAbout()">About</a>
        <i class="fa-solid fa-cart-shopping" onclick="goCart()"></i>
    </div>

</nav>

<div class="hero">
    <h1>Rare pieces. No restocks.</h1>
    <p>Curated vintage and standout finds for people who dress with intention.</p>
    <a href="shop.html" class="btn">Shop Kollections</a>
</div>

<div class="section">
    <h2>New Collection</h2>
    <div class="grid">
        <div class="card">
            <div class="card-image">Item</div>
        </div>
    </div>
</div>

<div class="section">
    <h2>Kóla’s Picks</h2>
    <div class="grid">
        <div class="card">
            <div class="card-image">Item</div>
        </div>
    </div>
</div>

<div class="footer">
© 2026 kólas.kloset
</div>

<script>
function goHome(){ window.location.href='index.html'; }
function goShop(){ window.location.href='shop.html'; }
function goAbout(){ window.location.href='about.html'; }
function goCart(){ window.location.href='cart.html'; }
</script>

</body>
</html>
