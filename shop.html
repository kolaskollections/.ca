<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shop — kólas.kloset</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
:root {
    --bg: #0a0a0a;
    --bg-soft: #111111;
    --panel: #171717;
    --text: #f5f1ea;
    --accent: #d87a1d;
    --accent-soft: #efc48d;
    --muted: #8d857b;
    --line: rgba(216, 122, 29, 0.14);
}

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

html {
    scroll-behavior: smooth;
}

body {
    background: linear-gradient(to bottom, #0a0a0a, #101010);
    color: var(--text);
    font-family: "Times New Roman", serif;
    overflow-x: hidden;
}

a {
    text-decoration: none;
    color: inherit;
}

img {
    max-width: 100%;
    display: block;
}

button {
    font-family: inherit;
}

/* NAV */
.nav {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    padding: 18px 0;
    z-index: 1000;
    background: rgba(10, 10, 10, 0.88);
    backdrop-filter: blur(10px);
    border-bottom: 1px solid rgba(216, 122, 29, 0.07);
}

.nav-inner {
    width: min(1180px, calc(100% - 40px));
    margin: 0 auto;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 20px;
}

.logo-button {
    background: transparent;
    border: none;
    padding: 0;
    margin: 0;
    cursor: pointer;
    flex-shrink: 0;
    box-shadow: none;
    outline: none;
    appearance: none;
    -webkit-appearance: none;
}

.logo-button:focus,
.logo-button:active,
.logo-button:focus-visible {
    background: transparent;
    border: none;
    outline: none;
    box-shadow: none;
}

.logo-image {
    height: clamp(38px, 5vw, 54px);
    width: auto;
}

.nav-right {
    display: flex;
    align-items: center;
    justify-content: flex-end;
    gap: clamp(14px, 2vw, 24px);
    flex-wrap: wrap;
}

.nav-right a {
    font-size: 11px;
    letter-spacing: 2px;
    color: var(--muted);
    text-transform: uppercase;
    transition: 0.3s;
    cursor: pointer;
    white-space: nowrap;
}

.nav-right a:hover {
    color: var(--accent);
}

.cart-icon-wrap {
    position: relative;
    cursor: pointer;
    color: var(--muted);
    transition: 0.3s;
    font-size: 15px;
    flex-shrink: 0;
}

.cart-icon-wrap:hover {
    color: var(--accent);
}

.cart-count {
    position: absolute;
    top: -8px;
    right: -10px;
    min-width: 18px;
    height: 18px;
    padding: 0 5px;
    border-radius: 999px;
    background: var(--accent);
    color: #111;
    font-size: 10px;
    line-height: 18px;
    text-align: center;
    font-weight: bold;
}

/* HERO */
.page-header {
    min-height: 58vh;
    display: flex;
    flex-direction: column;
    justify-content: end;
    padding: 140px 0 48px;
    background:
        linear-gradient(rgba(10, 10, 10, 0.50), rgba(10, 10, 10, 0.76)),
        radial-gradient(circle at 25% 35%, rgba(216, 122, 29, 0.12), transparent 42%),
        linear-gradient(135deg, #181818 0%, #0a0a0a 100%);
}

.page-header-inner {
    width: min(1180px, calc(100% - 40px));
    margin: 0 auto;
}

.page-header h1 {
    font-size: clamp(42px, 7vw, 76px);
    font-weight: 400;
    letter-spacing: 4px;
    text-transform: uppercase;
    margin-bottom: 12px;
}

.page-header .tagline {
    font-family: "Cormorant Garamond", serif;
    font-style: italic;
    font-size: clamp(22px, 3vw, 30px);
    color: var(--accent-soft);
}

/* CATEGORY BAR */
.category-bar {
    position: sticky;
    top: 74px;
    z-index: 900;
    background: rgba(12, 12, 12, 0.94);
    backdrop-filter: blur(10px);
    border-bottom: 1px solid var(--line);
}

.category-inner {
    width: min(1180px, calc(100% - 40px));
    margin: 0 auto;
    display: flex;
    gap: 22px;
    overflow-x: auto;
    padding: 16px 0;
    scrollbar-width: none;
}

.category-inner::-webkit-scrollbar {
    display: none;
}

.category-link {
    font-size: 11px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--muted);
    white-space: nowrap;
    transition: 0.3s;
}

.category-link:hover {
    color: var(--accent);
}

/* CONTENT */
.content {
    width: min(1180px, calc(100% - 40px));
    margin: 0 auto;
    padding: 56px 0 100px;
}

.shop-section {
    margin-bottom: 90px;
    scroll-margin-top: 150px;
}

.section-head {
    display: flex;
    justify-content: space-between;
    align-items: end;
    gap: 18px;
    margin-bottom: 28px;
    padding-bottom: 16px;
    border-bottom: 1px solid var(--line);
}

.section-title {
    font-size: 12px;
    letter-spacing: 6px;
    color: var(--accent);
    text-transform: uppercase;
}

.section-note {
    font-size: 11px;
    letter-spacing: 3px;
    color: var(--accent);
    text-transform: uppercase;
}

.grid {
    display: grid;
    grid-template-columns: repeat(3, minmax(0, 1fr));
    gap: 24px;
}

.card {
    background: var(--panel);
    border: 1px solid rgba(216, 122, 29, 0.08);
    overflow: hidden;
    transition: transform 0.35s ease, border-color 0.35s ease;
}

.card:hover {
    transform: translateY(-5px);
    border-color: rgba(216, 122, 29, 0.24);
}

.card-clickable {
    display: block;
    cursor: pointer;
}

.card-image {
    width: 100%;
    aspect-ratio: 3 / 4;
    background: linear-gradient(135deg, #282828, #171717);
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--muted);
    font-size: 13px;
    letter-spacing: 2px;
    overflow: hidden;
}

.card-image img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

.card-info {
    padding: 18px;
    border-top: 1px solid rgba(216, 122, 29, 0.10);
}

.card-name {
    font-size: 14px;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 8px;
}

.card-price {
    font-size: 12px;
    color: var(--accent);
    letter-spacing: 1px;
    margin-bottom: 16px;
}

.card-stock {
    font-size: 11px;
    color: var(--accent-soft);
    margin-bottom: 12px;
    letter-spacing: 1px;
}

.add-btn:disabled {
    opacity: 0.55;
    cursor: not-allowed;
    background: #2a2a2a;
    color: #999;
    border-color: #333;
}

.add-btn {
    width: 100%;
    padding: 12px 14px;
    border: 1px solid rgba(216, 122, 29, 0.24);
    background: transparent;
    color: var(--text);
    font-size: 11px;
    letter-spacing: 3px;
    text-transform: uppercase;
    cursor: pointer;
    transition: 0.3s;
}

.add-btn:hover {
    background: var(--accent);
    color: #111;
    border-color: var(--accent);
}

.footer {
    width: min(1180px, calc(100% - 40px));
    margin: 0 auto;
    padding: 0 0 80px;
    text-align: center;
    font-size: 11px;
    letter-spacing: 2px;
    color: var(--muted);
    border-top: 1px solid rgba(216, 122, 29, 0.15);
    padding-top: 40px;
}

@media (max-width: 1024px) {
    .grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
    }
}

@media (max-width: 640px) {
    .nav-inner,
    .page-header-inner,
    .category-inner,
    .content,
    .footer {
        width: min(1180px, calc(100% - 24px));
    }

    .nav {
        padding: 14px 0;
    }

    .logo-image {
        height: 40px;
    }

    .nav-right {
        gap: 12px;
    }

    .nav-right a {
        font-size: 10px;
        letter-spacing: 1.5px;
    }

    .cart-icon-wrap {
        font-size: 14px;
    }

    .category-bar {
        top: 68px;
    }

    .page-header {
        padding: 120px 0 36px;
    }

    .content {
        padding: 42px 0 70px;
    }

    .grid {
        grid-template-columns: 1fr;
    }

    .section-head {
        flex-direction: column;
        align-items: flex-start;
        gap: 8px;
    }
}
</style>
</head>
<body>

<nav class="nav">
    <div class="nav-inner">
        <button class="logo-button" onclick="goHome()" aria-label="Go to home page">
            <img src="./brand-logo.png" alt="kólas.kloset" class="logo-image">
        </button>

        <div class="nav-right">
            <a onclick="goShop()">Shop</a>
            <a onclick="goAbout()">About</a>

            <div class="cart-icon-wrap" onclick="goCart()" title="Cart">
                <i class="fa-solid fa-cart-shopping"></i>
                <span class="cart-count" id="cartCount">0</span>
            </div>
        </div>
    </div>
</nav>

<section class="page-header">
    <div class="page-header-inner">
        <h1>Shop Kollections</h1>
        <div class="tagline">Rare pieces. Built for presence. No restocks.</div>
    </div>
</section>

<div class="category-bar">
    <div class="category-inner">
        <a href="#new-arrivals" class="category-link">New Arrivals</a>

        <a href="#bottoms" class="category-link">Bottoms</a>

    </div>
</div>

<div class="content">

    <section class="shop-section" id="new-arrivals">
        <div class="section-head">
            <h2 class="section-title">New Arrivals</h2>
        </div>

        <div class="grid" id="new-arrivals-grid"></div>
    </section>

    <section class="shop-section" id="kola-picks">
        <div class="section-head">

        <div class="grid" id="kola-picks-grid"></div>
    </section>

    <section class="shop-section" id="tops">
        <div class="section-head">
            <h2 class="section-title">Tops</h2>
        </div>

        <div class="grid" id="tops-grid"></div>
    </section>

    <section class="shop-section" id="bottoms">
        <div class="section-head">
            <h2 class="section-title">Bottoms</h2>
        </div>

        <div class="grid" id="bottoms-grid"></div>
    </section>

    <section class="shop-section" id="shoes-accessories">
        <div class="section-head">
            <h2 class="section-title">Shoes / Accessories</h2>
        </div>

        <div class="grid" id="shoes-accessories-grid"></div>
    </section>

</div>

<footer class="footer">
    © kólas.kloset — Rare pieces. Built for presence.
</footer>

<script>
const INVENTORY_URL = "https://stripe-backend-m9du.onrender.com/inventory";

const PRODUCTS = [

    },
    {

    },
    {
        id: "luxury-vintage",
        name: "Luxury Vintage",

        description: "A standout vintage selection with elevated detailing and character.",
        images: ["./images/luxury-vintage-1.jpg", "./images/luxury-vintage-2.jpg", "./images/luxury-vintage-3.jpg"],
        imageLabel: "Pick 01"
    },
    {
        id: "designer-piece",
        name: "Designer Piece",
        category: "kola-picks",
        price: 10,
        description: "Curated for impact, structure, and styling versatility.",
        images: ["./images/designer-piece-1.jpg", "./images/designer-piece-2.jpg", "./images/designer-piece-3.jpg"],
        imageLabel: "Pick 02"
    },
    {
        id: "curated-find",
        name: "Curated Find",
        category: "kola-picks",
        price: 30,
        description: "A carefully selected statement piece from the kólas.kloset edit.",
        images: ["./images/curated-find-1.jpg", "./images/curated-find-2.jpg", "./images/curated-find-3.jpg"],
        imageLabel: "Pick 03"
    },
    {
        id: "structured-top",
        name: "Structured Top",
        category: "tops",
        price: 22,
        description: "A sharp top designed to hold shape and elevate a simple look.",
        images: ["./images/structured-top-1.jpg", "./images/structured-top-2.jpg", "./images/structured-top-3.jpg"],
        imageLabel: "Top 01"
    },
    {
        id: "statement-blouse",
        name: "Statement Blouse",
        category: "tops",
        price: 10,
        description: "A blouse with enough character to carry the whole outfit.",
        images: ["./images/statement-blouse-1.jpg", "./images/statement-blouse-2.jpg", "./images/statement-blouse-3.jpg"],
        imageLabel: "Top 02"
    },
    {
        id: "vintage-knit",
        name: "Vintage Knit",
        category: "tops",
        price: 68,
        description: "A textured knit with vintage appeal and easy layering potential.",
        images: ["./images/vintage-knit-1.jpg", "./images/vintage-knit-2.jpg", "./images/vintage-knit-3.jpg"],
        imageLabel: "Top 03"
    },
    {

        name: "Tailored Trouser",

        price: 96,
        description: "A polished trouser with a tailored fit and clean line.",
        images: ["./images/tailored-trouser-1.jpg", "./images/tailored-trouser-2.jpg", "./images/tailored-trouser-3.jpg"],
        imageLabel: "Bottom 01"
    },
    {
        id: "wide-leg-denim",
        name: "Wide Leg Denim",
        category: "bottoms",
        price: 50,
        description: "Wide-leg denim with structure, movement, and styling range.",
        images: ["./images/wide-leg-denim-1.jpg", "./images/wide-leg-denim-2.jpg", "./images/wide-leg-denim-3.jpg"],
        imageLabel: "Bottom 02"
    },
    {
        id: "vintage-skirt",
        name: "Vintage Skirt",
        category: "bottoms",
        price: 74,
        description: "A vintage skirt that brings shape and softness to a look.",
        images: ["./images/vintage-skirt-1.jpg", "./images/vintage-skirt-2.jpg", "./images/vintage-skirt-3.jpg"],
        imageLabel: "Bottom 03"
    },
    {
        id: "leather-bag",
        name: "Leather Bag",

        price: 145,
        description: "A structured leather bag with timeless styling value.",
        images: ["./images/leather-bag-1.jpg", "./images/leather-bag-2.jpg", "./images/leather-bag-3.jpg"],
        imageLabel: "Accessory 01"
    },
    {
        id: "statement-heel",
        name: "Statement Heel",
        category: "shoes-accessories",
        price: 132,
        description: "A standout heel chosen for shape, finish, and presence.",
        images: ["./images/statement-heel-1.jpg", "./images/statement-heel-2.jpg", "./images/statement-heel-3.jpg"],
        imageLabel: "Accessory 02"
    },
    {
        id: "vintage-sunglasses",
        name: "Vintage Sunglasses",
        category: "shoes-accessories",
        price: 58,
        description: "Vintage sunglasses that finish the look without trying too hard.",
        images: ["./images/vintage-sunglasses-1.jpg", "./images/vintage-sunglasses-2.jpg", "./images/vintage-sunglasses-3.jpg"],
        imageLabel: "Accessory 03"
    }
];

function goHome() {
    window.location.href = "index.html";
}

function goShop() {
    window.location.href = "shop.html";
}

function goAbout() {
    window.location.href = "about.html";
}

function goCart() {
    window.location.href = "cart.html";
}

function getCart() {
    return JSON.parse(localStorage.getItem("kolaCart")) || [];
}

function saveCart(cart) {
    localStorage.setItem("kolaCart", JSON.stringify(cart));
}

function updateCartCount() {
    const cart = getCart();
    const totalItems = cart.reduce((sum, item) => sum + item.quantity, 0);
    document.getElementById("cartCount").textContent = totalItems;
}

function openProduct(productId) {
    window.location.href = `product.html?id=${encodeURIComponent(productId)}`;
}

function addToCart(product) {
    const cart = getCart();
    const existingItem = cart.find(item => item.id === product.id);

    if (existingItem) {
        existingItem.quantity += 1;
    } else {
        cart.push({
            id: product.id,
            name: product.name,
            price: product.price,
            image: product.images[0],
            quantity: 1
        });
    }

    saveCart(cart);
    updateCartCount();
}

function handleAddToCart(event, productId) {
    event.stopPropagation();

    const product = PRODUCTS.find(item => item.id === productId);
    if (!product) return;

    const card = event.target.closest(".card");
    const btn = card.querySelector(".add-btn");
    if (btn.disabled) return;

    addToCart(product);
}

function renderProducts() {
    const grids = {
        "new-arrivals": document.getElementById("new-arrivals-grid"),
        "kola-picks": document.getElementById("kola-picks-grid"),
        "tops": document.getElementById("tops-grid"),
        "bottoms": document.getElementById("bottoms-grid"),
        "shoes-accessories": document.getElementById("shoes-accessories-grid")
    };

    Object.values(grids).forEach(grid => grid.innerHTML = "");

    PRODUCTS.forEach(product => {
        const card = document.createElement("div");
        card.className = "card";
        card.setAttribute("data-name", product.name);

        card.innerHTML = `
            <div class="card-clickable" onclick="openProduct('${product.id}')">
                <div class="card-image">
                    ${product.images[0]
                        ? `<img src="${product.images[0]}" alt="${product.name}" onerror="this.remove(); this.parentNode.textContent='${product.imageLabel}';">`
                        : product.imageLabel}
                </div>
                <div class="card-info">
                    <div class="card-name">${product.name}</div>
                    <div class="card-price">$${Number(product.price).toFixed(2)}</div>
                    <div class="card-stock">Loading stock...</div>
                </div>
            </div>
            <div class="card-info" style="padding-top: 0;">
                <button class="add-btn" onclick="handleAddToCart(event, '${product.id}')">Add to Cart</button>
            </div>
        `;

        grids[product.category].appendChild(card);
    });
}

async function loadInventory() {
    try {
        const res = await fetch(INVENTORY_URL);
        const inventory = await res.json();

        PRODUCTS.forEach(product => {
            updateProductCard(product.name, inventory[product.name]);
        });

    } catch (err) {
        console.error("Inventory load failed:", err);
    }
}

function updateProductCard(productName, productData) {
    if (!productData) return;

    const cards = document.querySelectorAll(".card");

    cards.forEach(card => {
        const nameEl = card.querySelector(".card-name");
        const priceEl = card.querySelector(".card-price");
        const btn = card.querySelector(".add-btn");

        if (!nameEl || !priceEl || !btn) return;

        if (nameEl.textContent.trim() === productName) {
            const backendPrice = Number(productData.price) || 0;
            const backendStock = Number(productData.stock) || 0;

            priceEl.textContent = `$${backendPrice.toFixed(2)}`;

            let stockEl = card.querySelector(".card-stock");
            if (!stockEl) {
                stockEl = document.createElement("div");
                stockEl.className = "card-stock";
                priceEl.insertAdjacentElement("afterend", stockEl);
            }

            if (backendStock <= 0) {
                stockEl.textContent = "Sold out";
                btn.disabled = true;
                btn.textContent = "Sold Out";
            } else if (backendStock === 1) {
                stockEl.textContent = "Only 1 left";
                btn.disabled = false;
                btn.textContent = "Add to Cart";
            } else {
                stockEl.textContent = `In stock: ${backendStock}`;
                btn.disabled = false;
                btn.textContent = "Add to Cart";
            }

            const product = PRODUCTS.find(item => item.name === productName);
            if (product) {
                product.price = backendPrice;
            }
        }
    });
}

renderProducts();
updateCartCount();
loadInventory();
</script>
