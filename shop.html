<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shop — kólas.kloset</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Parisienne&display=swap" rel="stylesheet">

<style>
:root {
    --bg: #080808;
    --panel: #121212;
    --text: #f8f4ed;
    --accent: #d87a1d;
    --accent-soft: #f0d4b0;
    --muted: #9b948b;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
    background:#080808;
    color:var(--text);
    font-family:"Cormorant Garamond", serif;
}

.nav {
    position:fixed;
    top:0;
    width:100%;
    padding:20px 50px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    background:rgba(8,8,8,0.9);
    backdrop-filter:blur(10px);
}

.logo-image {
    height:50px;
    cursor:pointer;
}

.nav-right {
    display:flex;
    gap:20px;
}

.nav-right a, .nav-right i {
    font-size:12px;
    letter-spacing:2px;
    color:var(--muted);
    cursor:pointer;
}

.nav-right a:hover, .nav-right i:hover {
    color:var(--accent);
}

.page-header {
    padding:140px 60px 60px;
}

.page-header h1 {
    font-size:70px;
    text-transform:uppercase;
}

.tagline {
    font-family:'Parisienne', cursive;
    font-size:30px;
    color:var(--accent-soft);
    margin-top:10px;
}

.content {
    padding:60px;
}

.collection-nav {
    display:flex;
    gap:12px;
    margin-bottom:40px;
}

.collection-nav a {
    border:1px solid #333;
    padding:8px 12px;
    font-size:11px;
    letter-spacing:2px;
    cursor:pointer;
}

.section {
    margin-bottom:70px;
}

.section h2 {
    margin-bottom:20px;
    letter-spacing:4px;
}

.grid {
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:20px;
}

.card {
    background:#121212;
    padding:15px;
}

.card-image {
    height:200px;
    background:#222;
    display:flex;
    align-items:center;
    justify-content:center;
}

.card-name { margin-top:10px; }

.card-price {
    color:var(--accent);
    margin:5px 0;
}

.add-btn {
    width:100%;
    padding:10px;
    border:1px solid var(--accent);
    background:none;
    color:var(--text);
    cursor:pointer;
}

.add-btn:hover {
    background:var(--accent);
    color:#111;
}

.footer {
    text-align:center;
    padding:40px;
    color:var(--muted);
}
</style>
</head>

<body>

<nav class="nav">
    <img src="./brand-logo.png" class="logo-image" onclick="goHome()">

    <div class="nav-right">
        <a onclick="goShop()">Shop</a>
        <a onclick="goAbout()">About</a>
        <i class="fa-solid fa-cart-shopping" onclick="goCart()"></i>
    </div>
</nav>

<div class="page-header">
    <h1>Shop Kollections</h1>
    <div class="tagline">Rare pieces. No restocks. Built for presence.</div>
</div>

<div class="content">

<div class="collection-nav">
    <a href="#tops">Tops</a>
    <a href="#bottoms">Bottoms</a>
    <a href="#jackets">Jackets</a>
    <a href="#shoes">Shoes</a>
</div>

<!-- TOPS -->
<div class="section" id="tops">
<h2>Tops</h2>
<div class="grid">
<div class="card">
<div class="card-image">Top</div>
<div class="card-name">Graphic Tee</div>
<div class="card-price">$65</div>
<button class="add-btn" onclick="addToCart('Graphic Tee',65)">Add to Cart</button>
</div>
</div>
</div>

<!-- BOTTOMS -->
<div class="section" id="bottoms">
<h2>Bottoms</h2>
<div class="grid">
<div class="card">
<div class="card-image">Bottom</div>
<div class="card-name">Cargo Pants</div>
<div class="card-price">$110</div>
<button class="add-btn" onclick="addToCart('Cargo Pants',110)">Add to Cart</button>
</div>
</div>
</div>

<!-- NEW ARRIVALS -->
<div class="section">
<h2>New Arrivals</h2>
<div class="grid">
<div class="card">
<div class="card-image">New</div>
<div class="card-name">Vintage Piece</div>
<div class="card-price">$89</div>
<button class="add-btn" onclick="addToCart('Vintage Piece',89)">Add to Cart</button>
</div>
</div>
</div>

<!-- PICKS -->
<div class="section">
<h2>Kóla’s Picks</h2>
<div class="grid">
<div class="card">
<div class="card-image">Pick</div>
<div class="card-name">Luxury Vintage</div>
<div class="card-price">$210</div>
<button class="add-btn" onclick="addToCart('Luxury Vintage',210)">Add to Cart</button>
</div>
</div>
</div>

</div>

<div class="footer">
© 2026 kólas.kloset
</div>

<script>
function goHome(){ window.location.href='index.html'; }
function goShop(){ window.location.href='shop.html'; }
function goAbout(){ window.location.href='about.html'; }
function goCart(){ window.location.href='cart.html'; }

function addToCart(name,price){
let cart=JSON.parse(localStorage.getItem('cart'))||[];
cart.push({name,price});
localStorage.setItem('cart',JSON.stringify(cart));
alert('Added to cart');
}
</script>

</body>
</html>
</body>
</html>
