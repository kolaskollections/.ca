<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shop — kólas.kloset</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Parisienne&display=swap" rel="stylesheet">

<style>
:root {
    --bg:#0a0a0a;
    --text:#f5f5f5;
    --accent:#d87a1d;
    --muted:#888;
}

body {
    margin:0;
    background:var(--bg);
    color:var(--text);
    font-family:"Times New Roman", serif;
}

.nav {
    position:fixed;
    width:100%;
    padding:30px 60px;
    display:flex;
    justify-content:space-between;
    background:rgba(0,0,0,0.85);
}

.logo-image { height:50px; cursor:pointer; }

.nav-right { display:flex; gap:30px; }

.nav-right a, .nav-right i {
    font-size:12px;
    color:var(--muted);
    cursor:pointer;
}

.nav-right a:hover, .nav-right i:hover { color:var(--accent); }

.header {
    padding:160px 60px 60px;
}

.header h1 {
    font-size:70px;
    text-transform:uppercase;
}

.tagline {
    font-family:"Parisienne", cursive;
    font-size:28px;
    color:#f0d4b0;
}

.grid {
    padding:60px;
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:30px;
}

.card {
    background:#1a1a1a;
    padding:20px;
}

.card-image {
    height:300px;
    background:#222;
    margin-bottom:15px;
}

.add-btn {
    border:1px solid var(--accent);
    background:none;
    color:white;
    padding:10px;
    cursor:pointer;
}

.add-btn:hover {
    background:var(--accent);
    color:black;
}
</style>
</head>

<body>

<nav class="nav">
<img src="./brand-logo.png" class="logo-image" onclick="goHome()">

<div class="nav-right">
<a onclick="goShop()">Shop</a>
<a onclick="goAbout()">About</a>
<i class="fa-solid fa-cart-shopping" onclick="goCart()"></i>
</div>
</nav>

<div class="header">
<h1>Shop Kollections</h1>
<div class="tagline">Rare pieces. No restocks. Built for presence.</div>
</div>

<div class="grid">

<div class="card">
<div class="card-image"></div>
<p>Vintage Piece — $89</p>
<button class="add-btn" onclick="addToCart('Vintage',89)">Add</button>
</div>

<div class="card">
<div class="card-image"></div>
<p>Rare Find — $120</p>
<button class="add-btn" onclick="addToCart('Rare',120)">Add</button>
</div>

</div>

<script>
function goHome(){location.href='index.html'}
function goShop(){location.href='shop.html'}
function goAbout(){location.href='about.html'}
function goCart(){location.href='cart.html'}

function addToCart(name,price){
let cart=JSON.parse(localStorage.getItem('cart'))||[];
cart.push({name,price});
localStorage.setItem('cart',JSON.stringify(cart));
alert("Added to cart");
}
</script>

</body>
</html>
